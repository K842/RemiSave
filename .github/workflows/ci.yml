name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: remisave-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./remisave-frontend
        run: npm install # Switch to install for more flexibility if lockfiles are messy

      - name: Build project
          # Note: Next.js 15+ build includes linting by default if configured
        working-directory: ./remisave-frontend
        run: npm run build
